name: PHP Base Images

on:
  push:
    branches: [master]
    paths:
      - "php/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/x-dockerize/php

jobs:
  build:
    name: PHP ${{ matrix.php_version }}-${{ matrix.variant }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php_version: ["8.3", "8.4", "8.5"]
        variant: ["fpm", "cli"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Resolve Dockerfile path
        id: dockerfile
        run: |
          SPECIFIC="php/${{ matrix.variant }}/${{ matrix.php_version }}/Dockerfile"
          DEFAULT="php/${{ matrix.variant }}/Dockerfile"
          if [ -f "$SPECIFIC" ]; then
            echo "path=$SPECIFIC" >> $GITHUB_OUTPUT
          else
            echo "path=$DEFAULT" >> $GITHUB_OUTPUT
          fi

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.php_version }}-${{ matrix.variant }}

      - name: Build & Push — ${{ matrix.php_version }}-${{ matrix.variant }}
        uses: docker/build-push-action@v5
        with:
          context: php
          file: ${{ steps.dockerfile.outputs.path }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=php-${{ matrix.php_version }}-${{ matrix.variant }}
          cache-to: type=gha,scope=php-${{ matrix.php_version }}-${{ matrix.variant }},mode=max
